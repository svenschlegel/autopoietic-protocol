<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- V4: Quad — closest to the Gemini reference you liked.
       Thick G + four equal dots in a 2x2 grid in the aperture.
       Clean, symmetric, bold. The four dots can represent the
       four friction types (Semantic, Deterministic, Spatial, Temporal). -->
  <rect width="400" height="400" fill="#020617"/>
  <path
    d="M 240 110 A 100 100 0 1 0 240 290 L 240 200 L 155 200"
    fill="none"
    stroke="#F8FAFC"
    stroke-width="40"
    stroke-linecap="square"
    stroke-linejoin="miter"
  />
  <circle cx="290" cy="155" r="13" fill="#F8FAFC"/>
  <circle cx="330" cy="155" r="13" fill="#F8FAFC"/>
  <circle cx="290" cy="245" r="13" fill="#F8FAFC"/>
  <circle cx="330" cy="245" r="13" fill="#F8FAFC"/>
</svg>
