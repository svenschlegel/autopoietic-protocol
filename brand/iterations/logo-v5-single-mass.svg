<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- V5: Single Mass — thick G with one large dot dead center
       of the aperture. The G is the orbit; the dot is the mass.
       Most reduced version of the "gravity" concept. -->
  <rect width="400" height="400" fill="#020617"/>
  <path
    d="M 240 110 A 100 100 0 1 0 240 290 L 240 200 L 160 200"
    fill="none"
    stroke="#F8FAFC"
    stroke-width="40"
    stroke-linecap="square"
    stroke-linejoin="miter"
  />
  <circle cx="305" cy="200" r="18" fill="#F8FAFC"/>
</svg>
