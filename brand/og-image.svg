<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feFlood flood-color="#6366F1" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#020617"/>

  <!-- Subtle ambient glow -->
  <circle cx="600" cy="315" r="200" fill="#6366F1" opacity="0.03" filter="url(#soft-glow)"/>

  <!-- Subtle grid -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.15">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- Logo G (small, top-left area) -->
  <g transform="translate(80, 60) scale(0.3)" filter="url(#glow)">
    <path
      d="
        M 130 55
        A 60 60 0 1 0 130 145
        Q 120 140, 108 135
        Q 92 128, 85 120
        L 85 105
        L 115 105
        L 115 115
        Q 118 120, 125 125
        A 45 45 0 1 1 125 75
        Q 100 72, 80 80
        A 60 60 0 0 0 130 55
        Z
      "
      fill="#F8FAFC"
      fill-rule="evenodd"
    />
  </g>

  <!-- Wordmark -->
  <text x="150" y="92" font-family="'Inter', 'Geist', system-ui, sans-serif" font-size="36" fill="#F8FAFC" font-weight="700" letter-spacing="3">GravDic</text>

  <!-- Divider line -->
  <line x1="80" y1="130" x2="1120" y2="130" stroke="#334155" stroke-width="1"/>

  <!-- Tagline -->
  <text x="600" y="220" font-family="'Inter', 'Geist', system-ui, sans-serif" font-size="28" fill="#F8FAFC" text-anchor="middle" font-weight="500">
    A protocol for AI swarms governed by physics,
  </text>
  <text x="600" y="260" font-family="'Inter', 'Geist', system-ui, sans-serif" font-size="28" fill="#F8FAFC" text-anchor="middle" font-weight="500">
    not committees.
  </text>

  <!-- Key metric — hero number -->
  <text x="600" y="370" font-family="'JetBrains Mono', monospace" font-size="72" fill="#10B981" text-anchor="middle" font-weight="700" opacity="0.9">49.5%</text>
  <text x="600" y="410" font-family="'JetBrains Mono', monospace" font-size="18" fill="#94A3B8" text-anchor="middle" letter-spacing="2">GINI REDUCTION</text>

  <!-- Supporting stats -->
  <g font-family="'JetBrains Mono', monospace" text-anchor="middle">
    <text x="350" y="490" font-size="20" fill="#6366F1" font-weight="500">0.685 -> 0.257</text>
    <text x="350" y="515" font-size="12" fill="#94A3B8" letter-spacing="1">MASS CONCENTRATION</text>

    <text x="850" y="490" font-size="20" fill="#F8FAFC" font-weight="500">Quality cost: 0%</text>
    <text x="850" y="515" font-size="12" fill="#94A3B8" letter-spacing="1">NO PERFORMANCE TRADE-OFF</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#0F172A"/>
  <text x="600" y="610" font-family="'JetBrains Mono', monospace" font-size="13" fill="#94A3B8" text-anchor="middle" letter-spacing="1">AUTOPOIETIC PROTOCOL | BASE L2 | M2M AGENT ECONOMY</text>
</svg>
