# Phase 1 — Treatment D: FULL REFORM STACK (sublinear + rebase + decay).
#
# §3.2 + §3.3 + §3.4. Identical to Treatment C except background decay is
# active at δ=0.001 per round. This is exploratory: V3.5 is intended to
# ship with δ=0 (decay infrastructure only, governance can activate later).
# Treatment D measures whether activating tiny decay adds value or just
# adds noise.
#
# δ=0.001 means: each round, an agent's routing mass is multiplied by 0.999.
# Over 100 rounds without any accrual, mass would shrink to 0.999^100 ≈ 0.905
# (a 9.5% loss). For an agent who keeps earning, decay is dominated by accrual
# in active domains and only meaningful in dormant ones — exactly the §3.4
# intent.
#
# Expected behavior:
#   - Indistinguishable from Treatment C in active-domain dynamics
#   - Idle agents' routing mass slowly bleeds in domains they don't work
#   - Mass distribution should be slightly more compressed than C at end of
#     each season but the difference may be too small to see in 100 rounds
#
# If Treatment D ≈ Treatment C, that confirms the spec's recommendation
# to ship V3.5 with δ=0 (decay is redundant overhead). If D shows clear
# improvement, that's an argument for activating decay in V3.5.

experiment:
  num_agents: 10
  num_rounds: 100
  payloads_per_round: 4
  seed: 42
  routing_algorithms:
    - gravitational

agents:
  default_model: "anthropic/claude-3.5-haiku"
  judge_model: "anthropic/claude-sonnet-4"
  initial_mass: 1.0
  max_load: 3
  models:
    - name: "haiku-1"
      model: "anthropic/claude-3.5-haiku"
      primary_domain: SEMANTIC
    - name: "haiku-2"
      model: "anthropic/claude-3.5-haiku"
      primary_domain: DETERMINISTIC
    - name: "gemini-flash-1"
      model: "google/gemini-2.0-flash-001"
      primary_domain: DETERMINISTIC
      secondary_domains: [SPATIAL]
    - name: "gemini-flash-2"
      model: "google/gemini-2.0-flash-001"
      primary_domain: SPATIAL
    - name: "llama-1"
      model: "meta-llama/llama-3.1-70b-instruct"
      primary_domain: SEMANTIC
      secondary_domains: [TEMPORAL]
    - name: "llama-2"
      model: "meta-llama/llama-3.1-70b-instruct"
      primary_domain: TEMPORAL
    - name: "gpt4o-mini-1"
      model: "openai/gpt-4o-mini"
      primary_domain: DETERMINISTIC
      secondary_domains: [SEMANTIC]
    - name: "gpt4o-mini-2"
      model: "openai/gpt-4o-mini"
      primary_domain: SPATIAL
      secondary_domains: [DETERMINISTIC]
    - name: "mistral-1"
      model: "mistralai/mistral-large"
      primary_domain: TEMPORAL
      secondary_domains: [SEMANTIC]
    - name: "qwen-1"
      model: "qwen/qwen-2.5-72b-instruct"
      primary_domain: SEMANTIC
      secondary_domains: [DETERMINISTIC]

payloads:
  domain_weights:
    SEMANTIC: 0.35
    DETERMINISTIC: 0.30
    SPATIAL: 0.20
    TEMPORAL: 0.15
  bounty_range: [1.0, 50.0]
  difficulty_range: [0.3, 0.9]
  execution_window: 60

protocol:
  alpha: 0.8
  beta: 1.5
  slash_rate: 0.05
  quarantine_threshold: 5
  sigma_min: 0.1
  sigma_max: 3.0
  quality_threshold: 0.5
  # === Treatment D: FULL STACK (exploratory; decay activated) ===
  sublinear_accrual: true    # § §3.2 ON
  season_length: 50          # § §3.3 ON
  season_rebase_c: 100.0
  decay_rate: 0.001          # § §3.4 ON (exploratory; V3.5 ships δ=0)

openrouter:
  base_url: "https://openrouter.ai/api/v1"

output:
  dir: "./results/phase1_d_full_stack"
  plots: true
