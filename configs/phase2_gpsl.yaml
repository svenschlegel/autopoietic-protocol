# Phase 2 — GPSL Cipher Encoding & Operator-Level Continuous Distance
#
# 2×2 factorial: {categorical D, continuous D} × {linear accrual, sublinear+rebase}
# 50 rounds × 4 payloads/round = 200 routing decisions per cell × 4 cells = 800 total
# Same agent pool as Phase 1 for direct comparison
# Estimated cost: ~$25-35

experiment:
  num_agents: 10
  num_rounds: 50
  payloads_per_round: 4
  seed: 42
  routing_algorithms:
    - gravitational_gpsl

agents:
  default_model: "anthropic/claude-3.5-haiku"
  judge_model: "anthropic/claude-sonnet-4"
  initial_mass: 1.0
  max_load: 3
  models:
    - name: "haiku-1"
      model: "anthropic/claude-3.5-haiku"
      primary_domain: SEMANTIC
    - name: "haiku-2"
      model: "anthropic/claude-3.5-haiku"
      primary_domain: DETERMINISTIC
    - name: "gemini-flash-1"
      model: "google/gemini-2.0-flash-001"
      primary_domain: DETERMINISTIC
      secondary_domains: [SPATIAL]
    - name: "gemini-flash-2"
      model: "google/gemini-2.0-flash-001"
      primary_domain: SPATIAL
    - name: "llama-1"
      model: "meta-llama/llama-3.1-70b-instruct"
      primary_domain: SEMANTIC
      secondary_domains: [TEMPORAL]
    - name: "llama-2"
      model: "meta-llama/llama-3.1-70b-instruct"
      primary_domain: TEMPORAL
    - name: "gpt4o-mini-1"
      model: "openai/gpt-4o-mini"
      primary_domain: DETERMINISTIC
      secondary_domains: [SEMANTIC]
    - name: "gpt4o-mini-2"
      model: "openai/gpt-4o-mini"
      primary_domain: SPATIAL
      secondary_domains: [DETERMINISTIC]
    - name: "mistral-1"
      model: "mistralai/mistral-large"
      primary_domain: TEMPORAL
      secondary_domains: [SEMANTIC]
    - name: "qwen-1"
      model: "qwen/qwen-2.5-72b-instruct"
      primary_domain: SEMANTIC
      secondary_domains: [DETERMINISTIC]

payloads:
  domain_weights:
    SEMANTIC: 0.0
    DETERMINISTIC: 0.0
    SPATIAL: 1.0
    TEMPORAL: 0.0
  bounty_range: [5.0, 20.0]
  difficulty_range: [0.3, 0.7]
  execution_window: 60

protocol:
  alpha: 0.8
  beta: 1.5
  slash_rate: 0.05
  quarantine_threshold: 5
  sigma_min: 0.1
  sigma_max: 3.0
  quality_threshold: 0.5
  sublinear_accrual: true
  season_length: 25          # rebase every 25 rounds (2 rebases in 50 rounds)
  season_rebase_c: 100.0
  decay_rate: 0.0

openrouter:
  base_url: "https://openrouter.ai/api/v1"

output:
  dir: "./results/phase2_gpsl"
  plots: false
